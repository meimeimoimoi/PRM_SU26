services:
  # Main Database for shared entities
  postgres-db:
    image: postgres:15-alpine
    container_name: smartdine-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - smartdine-network
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Monitoring & Observability
  seq:
    image: datalust/seq:latest
    container_name: seq
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq-data:/data
    networks:
      - smartdine-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - smartdine-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - smartdine-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11435:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - smartdine-network
    restart: unless-stopped

  identity-api:
    image: smartdine-identity-api:latest
    container_name: identity-api
    build:
      context: .
      dockerfile: docker/Identity.Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres-db;Port=5432;Database=smartdine;Username=postgres;Password=${POSTGRES_PASSWORD}
      - Jwt__SecretKey=${RsaPublicKey}
      - Jwt__Issuer=SmartDineAPI
      - Jwt__Audience=SmartDineApp
    ports:
      - "5001:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - smartdine-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  menu-api:
    image: smartdine-menu-api:latest
    container_name: menu-api
    build:
      context: .
      dockerfile: docker/Menu.Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres-db;Port=5432;Database=smartdine;Username=postgres;Password=${POSTGRES_PASSWORD}
      - Jwt__SecretKey=${RsaPublicKey}
      - Jwt__Issuer=SmartDineAPI
      - Jwt__Audience=SmartDineApp
    ports:
      - "5002:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - smartdine-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  order-api:
    image: smartdine-order-api:latest
    container_name: order-api
    build:
      context: .
      dockerfile: docker/Order.Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres-db;Port=5432;Database=smartdine;Username=postgres;Password=${POSTGRES_PASSWORD}
      - Jwt__SecretKey=${RsaPublicKey}
      - Jwt__Issuer=SmartDineAPI
      - Jwt__Audience=SmartDineApp
    ports:
      - "5003:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - smartdine-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  table-api:
    image: smartdine-table-api:latest
    container_name: table-api
    build:
      context: .
      dockerfile: docker/Table.Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres-db;Port=5432;Database=smartdine;Username=postgres;Password=${POSTGRES_PASSWORD}
      - Jwt__SecretKey=${RsaPublicKey}
      - Jwt__Issuer=SmartDineAPI
      - Jwt__Audience=SmartDineApp
    ports:
      - "5004:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - smartdine-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  ai-api:
    image: smartdine-ai-api:latest
    container_name: ai-api
    build:
      context: .
      dockerfile: docker/AI.Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Jwt__SecretKey=${RsaPublicKey}
      - Jwt__Issuer=SmartDineAPI
      - Jwt__Audience=SmartDineApp
      - Services__Ollama=http://ollama-service:11434
      - Services__OllamaModel=qwen2.5:1.5b
      - Services__TableApi=http://table-api:8080
      - Services__MenuApi=http://menu-api:8080
    ports:
      - "5005:8080"
    depends_on:
      ollama:
        condition: service_started
      table-api:
        condition: service_healthy
      menu-api:
        condition: service_healthy
    networks:
      - smartdine-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  gateway:
    image: smartdine-gateway:latest
    container_name: gateway-api
    build:
      context: .
      dockerfile: docker/Gateway.Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ReverseProxy__Clusters__auth-cluster__Destinations__destination1__Address=http://identity-api:8080
      - ReverseProxy__Clusters__menu-cluster__Destinations__destination1__Address=http://menu-api:8080
      - ReverseProxy__Clusters__orders-cluster__Destinations__destination1__Address=http://order-api:8080
      - ReverseProxy__Clusters__tables-cluster__Destinations__destination1__Address=http://table-api:8080
      - ReverseProxy__Clusters__ai-cluster__Destinations__destination1__Address=http://ai-api:8080
    ports:
      - "5000:8080"
    depends_on:
      identity-api:
        condition: service_healthy
      menu-api:
        condition: service_healthy
      order-api:
        condition: service_healthy
      table-api:
        condition: service_healthy
      ai-api:
        condition: service_healthy
    networks:
      - smartdine-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres-data:
  ollama-data:
  seq-data:
  prometheus-data:
  grafana-data:

networks:
  smartdine-network:
    driver: bridge
