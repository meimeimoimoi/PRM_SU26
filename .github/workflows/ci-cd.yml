name: SmartDine CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOTNET_VERSION: "9.0.x"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        working-directory: app/BE
        run: dotnet restore

      - name: Build
        working-directory: app/BE
        run: dotnet build --no-restore -c Release

      - name: Test
        working-directory: app/BE
        run: dotnet test --no-build -c Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/TestResults/*.trx"

  docker-build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - service: identity-api
            dockerfile: app/BE/docker/Identity.Dockerfile
            image: smartdine-identity-api
          - service: menu-api
            dockerfile: app/BE/docker/Menu.Dockerfile
            image: smartdine-menu-api
          - service: order-api
            dockerfile: app/BE/docker/Order.Dockerfile
            image: smartdine-order-api
          - service: table-api
            dockerfile: app/BE/docker/Table.Dockerfile
            image: smartdine-table-api
          - service: ai-api
            dockerfile: app/BE/docker/AI.Dockerfile
            image: smartdine-ai-api
          - service: gateway
            dockerfile: app/BE/docker/Gateway.Dockerfile
            image: smartdine-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: app/BE
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
